name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle assembleDebug 2>&1 | tee build.log

      - name: Report errors as annotations
        if: failure()
        shell: bash
        run: |
          grep -E "^e: |error:|FAILURE:|Caused by|What went wrong" build.log | head -40 | \
            while IFS= read -r line; do echo "::error::${line}"; done

      - uses: actions/upload-artifact@v4
        with:
          name: lasttime-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
